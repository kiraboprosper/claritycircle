<!DOCTYPE html>
<html>
<head>
<title>Clarity Circle</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-maroon px-4">
    <a class="navbar-brand" href="/">Clarity Circle</a>

    <div class="ms-auto">
        {% if user %}
            <span class="text-white me-3">Hi, {{user}}</span>
            <a href="/logout" class="btn btn-light">Logout</a>
        {% else %}
            <a href="/login" class="btn btn-light me-2">Login</a>
            <a href="/signup" class="btn btn-warning">Join</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
